name: Terraform modules tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  terraform-tests:
    uses: canonical/operator-workflows/.github/workflows/terraform_modules_test.yaml@fix/terraform-tests-with-lxd-and-k8s
    secrets: inherit
    with:
      k8s-controller: true
      lxd-controller: true
      terraform-directories: '["terraform/charm", "terraform/product"]'
